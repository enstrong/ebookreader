services:
  db:
    image: postgres:13-alpine
    container_name: ebookreader_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ebookreader
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ebookreader"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ebookreader_backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/ebookreader
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 12345
      GOOGLE_WEB_CLIENT_ID: ${GOOGLE_WEB_CLIENT_ID}
      LOOKUP_TRANSLATE_BASE_URL: http://libretranslate:5000
      RECOMMENDATIONS_HYBRID_SERVICE_URL: http://recommender:8001
      RECOMMENDATIONS_WORK_MAP_PATH: /app/data/recommendations/hybrid/goodreads_work_map.csv
    volumes:
      - ./backend/assets:/app/assets
      - ./data/recommendations/hybrid/goodreads_work_map.csv:/app/data/recommendations/hybrid/goodreads_work_map.csv:ro
    depends_on:
      db:
        condition: service_healthy
      libretranslate:
        condition: service_started
      recommender:
        condition: service_healthy

  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: ebookreader_libretranslate
    restart: unless-stopped
    environment:
      LT_LOAD_ONLY: en,ru
      LT_DISABLE_WEB_UI: "true"

  recommender:
    build:
      context: .
      dockerfile: scripts/recommendations/Dockerfile.hybrid
    container_name: ebookreader_recommender
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - ./data/recommendations/experiments/als_reads_20k_f256_i10_lam1p0_validation_split:/app/data/recommendations/experiments/als_reads_20k_f256_i10_lam1p0_validation_split:ro
      - ./data/recommendations/hybrid/book_metadata_20k.csv:/app/data/recommendations/hybrid/book_metadata_20k.csv:ro
      - ./data/recommendations/hybrid/goodreads_work_map.csv:/app/data/recommendations/hybrid/goodreads_work_map.csv:ro
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=2).read()
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s

# Данные теперь сохраняются в локальные папки ./postgres_data и ./backend/assets
# Это гарантирует, что они не пропадут при перезагрузке Docker.
